<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THEATRON | Session Recordings</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" rel="stylesheet"/>
<link href="theme.css" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface": "#131313",
        "surface-container": "#201f1f",
        "surface-high": "#2a2a2a",
        "primary": "#00ff41",
        "primary-dim": "#00e639",
        "secondary": "#56e15b",
        "on-surface": "#e5e2e1",
        "on-surface-variant": "#b9ccb2",
        "outline": "#84967e",
        "outline-variant": "#3b4b37",
        "error": "#ffb4ab",
      }
    }
  }
}
</script>
</head>
<body class="bg-surface text-on-surface min-h-screen flex">

<!-- Sidebar -->
<nav class="w-56 bg-surface-container border-r border-outline-variant flex flex-col min-h-screen fixed left-0 top-0">
  <div class="p-4 border-b border-outline-variant">
    <div class="label">TERMINAL_ARCHITECT</div>
    <div class="text-xs text-on-surface-variant mono mt-1">SYSTEM_NODE_01</div>
  </div>

  <div class="flex-1 py-2">
    <a href="#/dashboard" class="nav-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer hover:bg-surface-high" data-screen="dashboard">
      <span class="material-symbols-outlined text-lg">dashboard</span>
      <span class="label">DASHBOARD</span>
    </a>
    <a href="#/sessions" class="nav-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer hover:bg-surface-high" data-screen="sessions">
      <span class="material-symbols-outlined text-lg">terminal</span>
      <span class="label">SESSIONS</span>
    </a>
    <a href="#/viewer" class="nav-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer hover:bg-surface-high" data-screen="viewer">
      <span class="material-symbols-outlined text-lg">play_circle</span>
      <span class="label">VIEWER</span>
    </a>
    <a href="#/exports" class="nav-item flex items-center gap-3 px-4 py-3 text-sm cursor-pointer hover:bg-surface-high" data-screen="exports">
      <span class="material-symbols-outlined text-lg">download</span>
      <span class="label">EXPORTS</span>
    </a>
  </div>

  <div class="border-t border-outline-variant p-4">
    <button class="btn-primary w-full mb-3">RECORD_NEW</button>
    <a href="#" class="flex items-center gap-2 text-xs text-on-surface-variant hover:text-primary py-1">
      <span class="material-symbols-outlined text-sm">description</span>
      <span>DOCS</span>
    </a>
    <a href="#" class="flex items-center gap-2 text-xs text-on-surface-variant hover:text-primary py-1">
      <span class="material-symbols-outlined text-sm">logout</span>
      <span>LOGOUT</span>
    </a>
  </div>
</nav>

<!-- Main content -->
<main class="ml-56 flex-1 min-h-screen">
  <!-- Top bar -->
  <header class="bg-surface-container border-b border-outline-variant px-6 py-3 flex items-center justify-between sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <span class="text-primary font-semibold tracking-wide" style="font-family:'Space Grotesk'">THEATRON</span>
      <div class="relative">
        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">search</span>
        <input type="text" id="global-search" placeholder="CMD_LINE_SEARCH"
          class="bg-surface border border-outline-variant pl-10 pr-4 py-1.5 text-sm mono w-64 focus:border-primary focus:outline-none"/>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary">notifications</span>
      <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary">videocam</span>
      <span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary">settings</span>
      <div class="w-8 h-8 rounded-full bg-surface-high border border-outline-variant flex items-center justify-center">
        <span class="material-symbols-outlined text-sm">person</span>
      </div>
    </div>
  </header>

  <!-- Screen containers -->
  <div id="screen-dashboard" class="p-6" style="display:none"></div>
  <div id="screen-sessions" class="p-6" style="display:none"></div>
  <div id="screen-viewer" class="p-6" style="display:none"></div>
  <div id="screen-exports" class="p-6" style="display:none"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="app.js"></script>
<script src="dashboard.js"></script>
<script src="browser.js"></script>
<script src="terminal.js"></script>
<script src="exports.js"></script>
</body>
</html>
